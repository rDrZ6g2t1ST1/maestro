name: Rename File  

on:
  workflow_dispatch:

jobs:
  rename file:
    runs-on: ubuntu-latest
    env:
      RCLONE_CONF: ${{ secrets.RCLONE_CONF }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install rclone
        run: |
          wget -O bclone.zip https://github.com/BenjiThatFoxGuy/bclone/releases/download/v1.73.1/rclone-v1.73.1-linux-amd64.zip
          unzip -o bclone.zip
          sudo install -m 755 rclone-v1.73.1-linux-amd64/rclone /usr/local/bin/rclone
          rclone version
          rclone config file

      - name: Load rclone config
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONF" > ~/.config/rclone/rclone.conf

      - name: Copy rename.sh files
        run: |
          mkdir -p ~/scripts
          cp rename.sh ~/scripts/rename.sh
          chmod +x ~/scripts/rename.sh
          bash ~/scripts/rename.sh

      - name: Delete Files
        run: |
          rm -rf ~/.config
          rm -rf ~/scripts
          sleep 10s
